<div class="auth-hero min-vh-100 d-flex flex-column align-items-center justify-content-start py-5">
  <img src="assets/img/logo.png" alt="Logo" height="62" class=""><br>

  <div class="auth-card shadow-lg p-4 p-sm-5">
    <h3 class="text-center fw-bold mb-1">¡Bienvenido!</h3>
    <p class="text-center text-muted mb-4">Inicia sesión para continuar</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">


      <div class="mb-3">
        <label for="exampleInputEmail1" class="form-label fw-semibold">Email o numero de cliente</label>
        <div class="input-glow-wrapper">
          <input formControlName="usuario" type="text" class="form-control input-glow" id="exampleInputEmail1"
            placeholder="correo@dominio.com" aria-describedby="emailHelp">
        </div>

        <div *ngIf="usuario.invalid && (usuario.dirty || usuario.touched)" class="mt-2 small text-danger">
          <div *ngIf="usuario.errors?.['required']">
            campo requerido
          </div>
          <div *ngIf="usuario.errors?.['usuario']">
            Email debe tener formato valido
          </div>
        </div>


      </div>

      <div class="mb-3">

        <label for="exampleInputPassword1" class="form-label fw-semibold">Password</label>
        <div class="input-glow-wrapper">
          <div class="input-group">
            <input [type]="showPassword ? 'text' : 'password'" formControlName="password"
              class="form-control input-glow" autocomplete="current-password" placeholder="••••••••" />
            <button type="button" class="btn-eye-toggle" [class.revealed]="showPassword" (click)="viewPassword()"
              title="Mostrar/ocultar contraseña">
              <span class="eye-icon-wrap">
                <img [src]="showPassword ? 'assets/img/invisible.png' : 'assets/img/ojo.png'" alt="toggle" width="20"
                  height="20">
              </span>
            </button>

          </div>
        </div>


        <div *ngIf="password.invalid && (password.dirty || password.touched)" class="mt-2 small text-danger">
          <div *ngIf="password.errors?.['required']">
            Password requerido
          </div>
          <div *ngIf="error" class="text-danger mb-4">{{ error }}</div>
        </div>

      </div>
      <div class="d-flex justify-content-between mb-4">
        <a routerLink="/crear-cuenta" class="link-subtle">Crear cuenta</a>
        <a routerLink="/recuperar-password" class="link-subtle">¿Olvidaste tu contraseña?</a>
      </div>
      <p *ngIf="error" class="text-danger mb-4">{{ error }}</p>

      <div class="btn-water-wrapper">
        <button type="submit" class="btn-water" [disabled]="loading" [class.loading]="loading">
          <span class="water-fill"></span>
          <span class="btn-water-content">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            <span>{{ loading ? 'Iniciando...' : 'Iniciar sesión' }}</span>
          </span>
        </button>
      </div>
    </form>
      <ngx-sonner-toaster richColors position="top-center" />
  </div>
</div>
