<div class="login-layout">
  <!-- Panel izquierdo con la imagen (visible solo en pantallas grandes) -->
  <aside class="login-sidebar">
    <img src="assets/img/login/fondo1.png" alt="Emenet Comunicaciones" class="sidebar-image">
  </aside>

  <!-- Panel derecho con el formulario -->
  <main class="login-main flex-column">

    <!-- Logo -->
    <div class="text-center mb-4 mt-n4">
      <img src="assets/img/emenetLogo.png" alt="Emenet Logo" height="70">
    </div>

    <div class="auth-card shadow-lg p-4 p-sm-5">
      <h3 class="text-center fw-bold mb-1">¡Bienvenido!</h3>
      <p class="text-center text-muted mb-4">Inicia sesión para continuar</p>

      <form [formGroup]="loginForm" (ngSubmit)="login()">

        <!-- Campo: Email o número de cliente -->
        <div class="mb-4">
          <label for="inputUsuario" class="form-label fw-semibold">Numero de cliente</label>
          <div class="input-glow-wrapper">
            <input id="inputUsuario" type="text" formControlName="usuario" class="form-control input-glow"
              placeholder="#####">
          </div>
          <div *ngIf="usuario.invalid && (usuario.dirty || usuario.touched)" class="mt-2 text-danger small">
            <span *ngIf="usuario.errors?.['required']">El campo es requerido.</span>
            <span *ngIf="usuario.errors?.['maxLength']">El número de cliente es demasaido largo.</span>
          </div>
        </div>

        <!-- Campo: Password -->
        <div class="mb-4">
          <label for="inputPassword" class="form-label fw-semibold">Password</label>
          <div class="input-glow-wrapper">
            <div class="input-group">
              <input id="inputPassword" [type]="showPassword ? 'text' : 'password'" formControlName="password"
                class="form-control input-glow border-end-0" autocomplete="current-password" placeholder="••••••••" />
              <button type="button" class="btn-eye-toggle" [class.revealed]="showPassword" (click)="viewPassword()"
                title="Mostrar/ocultar contraseña" aria-label="Alternar visibilidad de contraseña">
                <div class="eye-icon-wrap">
                  <img [src]="showPassword ? 'assets/img/invisible.png' : 'assets/img/ojo.png'" alt="toggle" width="20"
                    height="20">
                </div>
              </button>
            </div>
          </div>
          <div *ngIf="password.invalid && (password.dirty || password.touched)" class="mt-2 text-danger small">
            <span *ngIf="password.errors?.['required']">El password es requerido.</span>
          </div>
        </div>

        <!-- Enlaces: Crear cuenta y Recuperar password -->
        <div class="d-flex justify-content-between align-items-center mb-5">
          <a routerLink="/crear-cuenta" class="link-subtle">Crear cuenta</a>
          <a routerLink="/recuperar-password" class="link-subtle">¿Olvidaste tu contraseña?</a>
        </div>

        <!-- Mensaje de error global -->
        <div *ngIf="error" class="alert alert-danger mb-4 py-2 small text-center">
          {{ error }}
        </div>

        <!-- Botón Iniciar Sesión -->
        <div class="btn-water-wrapper">
          <button type="submit" class="btn-water" [disabled]="loading" [class.loading]="loading">
            <span class="water-fill"></span>
            <span class="btn-water-content">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              <span>{{ loading ? 'INICIANDO...' : 'INICIAR SESIÓN' }}</span>
            </span>
          </button>
        </div>

      </form>

      <ngx-sonner-toaster richColors position="top-center"></ngx-sonner-toaster>
    </div>
  </main>
</div>
